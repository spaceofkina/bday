<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Click for Birthday Wish - Berto</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      min-height: 100vh;
      background: linear-gradient(135deg, #f9a825 0%, #ff6f00 100%);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Segoe UI', 'Poppins', 'Arial', system-ui, sans-serif;
      padding: 20px;
      cursor: pointer;
    }

    /* Main birthday card - clickable container */
    .birthday-clicker {
      max-width: 550px;
      width: 100%;
      background: #fff9f0;
      border-radius: 48px;
      box-shadow: 0 30px 40px rgba(0, 0, 0, 0.3);
      text-align: center;
      padding: 2rem 2rem 2.5rem;
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      cursor: pointer;
      user-select: none;
      border: 3px solid #ffd966;
    }

    .birthday-clicker:hover {
      transform: translateY(-6px);
      box-shadow: 0 35px 45px rgba(0, 0, 0, 0.35);
    }

    .birthday-clicker:active {
      transform: scale(0.98);
    }

    /* Fun initial state */
    .invite-icon {
      font-size: 5rem;
      margin-bottom: 1rem;
      display: inline-block;
      animation: bounce 1.2s infinite ease;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-12px); }
    }

    .click-message {
      font-size: 1.9rem;
      font-weight: 800;
      color: #b45f2b;
      background: #ffefcf;
      display: inline-block;
      padding: 10px 28px;
      border-radius: 60px;
      margin: 15px 0;
      letter-spacing: 1px;
    }

    .sub-click {
      font-size: 1.2rem;
      color: #d47c3a;
      font-weight: 500;
      margin-top: 10px;
    }

    .cake-emoji {
      font-size: 3.8rem;
      margin-top: 15px;
      filter: drop-shadow(2px 6px 10px rgba(0,0,0,0.2));
    }

    /* This is the area where the big birthday message will appear */
    .birthday-output {
      margin-top: 25px;
      background: #fff2e0;
      border-radius: 60px;
      padding: 20px 16px;
      transition: all 0.3s cubic-bezier(0.2, 0.9, 0.4, 1.1);
      min-height: 110px;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
    }

    .hidden-message {
      opacity: 0;
      transform: scale(0.8);
      transition: 0.2s;
    }

    .show-message {
      opacity: 1;
      transform: scale(1);
    }

    .birthday-text {
      font-size: 2.1rem;
      font-weight: 900;
      color: #c0392b;
      text-shadow: 3px 3px 0 #ffbc6e;
      letter-spacing: 2px;
      word-break: keep-all;
      line-height: 1.3;
    }

    .extra-spark {
      font-size: 2rem;
      margin-top: 8px;
      letter-spacing: 6px;
    }

    /* Simple responsive */
    @media (max-width: 500px) {
      .birthday-clicker {
        padding: 1.5rem;
      }
      .birthday-text {
        font-size: 1.7rem;
      }
      .click-message {
        font-size: 1.4rem;
        padding: 6px 20px;
      }
      .invite-icon {
        font-size: 4rem;
      }
    }

    /* Just a little instruction tooltip */
    .click-hint {
      font-size: 0.8rem;
      color: #e68a2e;
      background: #fff0da;
      display: inline-block;
      padding: 5px 15px;
      border-radius: 30px;
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="birthday-clicker" id="birthdayCard">
  <!-- initial cute content -->
  <div class="invite-icon">
    🎁🎂🎈
  </div>
  <div class="click-message">
    ✨ CLICK ME ✨
  </div>
  <div class="sub-click">
    
  </div>
  <div class="cake-emoji">
    🍰 🕯️ 🎉
  </div>
  
  <!-- This output area will show the special message when clicked -->
  <div id="messageArea" class="birthday-output">
    <div class="birthday-text" id="dynamicMessage">
      🎈 ready? 🎈
    </div>
    <div class="extra-spark" id="sparkles">
      ✨ 💫 ✨
    </div>
  </div>
  
</div>

<script>
  // Simple direct click handler: on click will say "HAPPY BIRTHDAY, BERTO!!"
  const card = document.getElementById('birthdayCard');
  const messageDiv = document.getElementById('dynamicMessage');
  const sparklesDiv = document.getElementById('sparkles');
  
  // flag to track if we already showed main message? no, we can update on each click but we want it to always say the same?
  // the requirement: when I click it will say "HAPPY BIRTHDAY, BERTO!!"
  // So on each click, we display exactly that. But maybe we can also add a confetti style? but simple, just the text.
  // However, we want it to be obvious. Even if clicked again it shows the same greeting (no harm)
  
  function sayHappyBirthdayBerto() {
    // set main message to uppercase greeting exactly as specified: "HAPPY BIRTHDAY, BERTO!!"
    messageDiv.innerHTML = "🎉 HAPPY BIRTHDAY, BERTO!! 🎉";
    // add celebratory sparkles emojis
    sparklesDiv.innerHTML = "🎊 🎆 🎇 🎊";
    // add a little animation flair
    messageDiv.style.transform = "scale(1.05)";
    setTimeout(() => {
      if (messageDiv) messageDiv.style.transform = "scale(1)";
    }, 180);
    
    // also optional: change the background of output area quickly for fun?
    const outputArea = document.getElementById('messageArea');
    if (outputArea) {
      outputArea.style.backgroundColor = "#ffe3b5";
      outputArea.style.transition = "0.2s";
      setTimeout(() => {
        outputArea.style.backgroundColor = "#fff2e0";
      }, 300);
    }
  }
  
  // On click event for the whole card (the main birthday container)
  card.addEventListener('click', function(e) {
    // prevent any accidental propagation (not needed but safe)
    e.stopPropagation();
    sayHappyBirthdayBerto();
    
    // small extra: add a tiny 'click' effect on the whole card body? just for sensory
    card.style.transform = "scale(0.99)";
    setTimeout(() => {
      card.style.transform = "";
    }, 120);
  });
  
  // Optional, also if someone double clicks or something, it's still the same happy message
  // we make sure that the initial state still can be overwritten with the message.
  // For better UX, if the user wants to see the greeting multiple times, each click shows the same.
  
  // I'll also pre-set an optional 'reset'? No need, because clicking again will just show same message.
  // No requirement to revert.
  
  // But the card also looks neat, also we can attach a nice style to ensure accessibility.
  console.log("Birthday card ready — click anywhere to wish BERTO!");
  
  // As an extra delight: if someone clicks on the 'messageArea' itself same effect (since event bubbles to card)
  // Perfect.
  
  // For good measure, we also add a tiny background confetti simulation? not needed but adds more happiness? The requirement just says simple and upon click says the phrase.
  // But we will keep the interface extremely simple, no extra complexity.
  // However I'll add a subtle sound? no audio needed, pure visual click.
  
  // Also the card's initial message before click says "ready?" but after first click shows the full greeting.
  // If someone wants to show the greeting again — they click again! Exactly matching: "when i click it will say"
</script>
</body>
</html>
